<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#071a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sequence" />
  <title>Sequence Board</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; background: #071a0f; }
    body { overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
    const { useState } = React;

    // Verified by owner reading physical board aloud — all 48 cards ×2, all K/Q adjacent
    const BOARD = [
      ["FREE","6D","7D","8D","9D","TD","QD","KD","AD","FREE"],
      ["5D","3H","2H","2S","3S","4S","5S","6S","7S","AC"],
      ["4D","4H","KD","AD","AC","KC","QC","TC","8S","KC"],
      ["3D","5H","QD","QH","TH","9H","8H","9C","9S","QC"],
      ["2D","6H","TD","KH","3H","2H","7H","8C","TS","TC"],
      ["AS","7H","9D","AH","4H","5H","6H","7C","QS","9C"],
      ["KS","8H","8D","2C","3C","4C","5C","6C","KS","8C"],
      ["QS","9H","7D","6D","5D","4D","3D","2D","AS","7C"],
      ["TS","TH","QH","KH","AH","2C","3C","4C","5C","6C"],
      ["FREE","9S","8S","7S","6S","5S","4S","3S","2S","FREE"],
    ];

    const SYM  = { S:"♠", H:"♥", D:"♦", C:"♣" };
    const RED  = { H:true, D:true, S:false, C:false };

    // Face card watermark symbols (rotated with card, tops to left)
    const ROYAL = { K:"♚", Q:"♛" };

    // Background tints for royal cards
    const ROYAL_BG = {
      K: { red:"#fff8e8", black:"#f0f4ff" },
      Q: { red:"#fdf0ff", black:"#f0fff4" },
    };

    const TEAMS = {
      team1:{ color:"#2563eb", glow:"#3b82f6", light:"#bfdbfe", name:"Blue"  },
      team2:{ color:"#16a34a", glow:"#22c55e", light:"#bbf7d0", name:"Green" },
      team3:{ color:"#dc2626", glow:"#ef4444", light:"#fecaca", name:"Red"   },
    };
    const ALL_TEAMS = ["team1","team2","team3"];

    function parse(c){ return c==="FREE"?null:{val:c.slice(0,-1),suit:c.slice(-1)}; }
    function dv(v){ return v==="T"?"10":v; }

    function findSeqs(chips, teams){
      const out=[], DIRS=[[0,1],[1,0],[1,1],[1,-1]];
      for(const team of teams){
        for(let r=0;r<10;r++) for(let c=0;c<10;c++) for(const [dr,dc] of DIRS){
          const cells=[];
          for(let i=0;i<5;i++){
            const nr=r+dr*i, nc=c+dc*i;
            if(nr<0||nr>9||nc<0||nc>9){cells.length=0;break;}
            if(BOARD[nr][nc]==="FREE"||chips[nr][nc]===team) cells.push([nr,nc]);
            else{cells.length=0;break;}
          }
          if(cells.length===5) out.push({team,cells});
        }
      }
      const seen=new Set();
      return out.filter(s=>{
        const k=s.team+":"+[...s.cells].sort((a,b)=>a[0]-b[0]||a[1]-b[1]).map(x=>x.join(",")).join("|");
        return seen.has(k)?false:(seen.add(k),true);
      });
    }

    function App(){
      const [screen,  setScreen]  = useState("setup");
      const [numP,    setNumP]    = useState(2);
      const [chips,   setChips]   = useState(()=>Array.from({length:10},()=>Array(10).fill(null)));
      const [curP,    setCurP]    = useState(0);
      const [fixMode, setFixMode] = useState(false);
      const [seqs,    setSeqs]    = useState([]);
      const [winner,  setWinner]  = useState(null);

      // Both modes require 2 sequences to win.
      // Two sequences may share at most 1 cell (official rules).
      // A 6-in-a-row is NOT two sequences — you'd need 10 in a row for that.
      const activeTeams = numP===3 ? ["team1","team2","team3"] : ["team1","team2"];
      const seqsToWin   = 2;

      // Returns true if a team has 2 sequences that share ≤ 1 cell
      function hasWon(ns, team) {
        const ts = ns.filter(s => s.team === team);
        if (ts.length < 2) return false;
        for (let i = 0; i < ts.length; i++) {
          for (let j = i + 1; j < ts.length; j++) {
            const setI = new Set(ts[i].cells.map(([r,c]) => `${r},${c}`));
            const shared = ts[j].cells.filter(([r,c]) => setI.has(`${r},${c}`)).length;
            if (shared <= 1) return true;
          }
        }
        return false;
      }

      const pList = numP===2
        ?[{team:"team1",name:"Player 1"},{team:"team2",name:"Player 2"}]
        :[{team:"team1",name:"Player 1"},{team:"team2",name:"Player 2"},{team:"team3",name:"Player 3"}];

      const curTeam = pList[curP].team;
      const curName = pList[curP].name;
      const T       = TEAMS[curTeam];

      const lockedSet = new Set(seqs.flatMap(s=>s.cells.map(([r,c])=>`${r},${c}`)));
      const isLocked  = (r,c)=>lockedSet.has(`${r},${c}`);

      const tap=(r,c)=>{
        if(winner||BOARD[r][c]==="FREE") return;
        const chip=chips[r][c], lk=isLocked(r,c);
        const next=chips.map(row=>[...row]);
        let changed=false, advance=false;
        if(fixMode){
          if(chip===curTeam&&!lk){next[r][c]=null;changed=true;}
        } else {
          if(!chip){next[r][c]=curTeam;changed=true;advance=true;}
          else if(chip!==curTeam&&!lk){next[r][c]=null;changed=true;advance=true;}
        }
        if(!changed) return;
        setChips(next);
        const ns=findSeqs(next, activeTeams);
        setSeqs(ns);
        const w = activeTeams.find(t => hasWon(ns, t)) || null;
        if(w) setWinner(w);
        if(advance&&!w) setCurP(p=>(p+1)%pList.length);
        if(advance) setFixMode(false);
      };

      const reset=()=>{
        setChips(Array.from({length:10},()=>Array(10).fill(null)));
        setCurP(0);setFixMode(false);setSeqs([]);setWinner(null);
      };

      // ── SETUP ──────────────────────────────────────────────────────────────
      if(screen==="setup") return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#071a0f 0%,#0d2c1a 60%,#071a0f 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Georgia',serif"}}>
          <div style={{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:24,padding:"44px 36px",textAlign:"center",maxWidth:480,width:"90%"}}>
            <div style={{fontSize:"clamp(32px,6vw,52px)",fontWeight:"bold",letterSpacing:"0.22em",color:"#f59e0b",textShadow:"0 0 32px rgba(245,158,11,0.45)",marginBottom:6}}>SEQUENCE</div>
            <div style={{color:"#6ee7b7",fontSize:12,letterSpacing:"0.18em",marginBottom:40}}>DIGITAL BOARD TRACKER</div>
            <div style={{color:"#94a3b8",fontSize:14,marginBottom:14}}>Select mode</div>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:32}}>
              {[
                {n:2,label:"2 Players",sub:"1v1 or 2v2 teams"},
                {n:3,label:"3 Players",sub:"Free-for-all"},
              ].map(({n,label,sub})=>(
                <button key={n} onClick={()=>setNumP(n)} style={{padding:"18px 26px",borderRadius:14,cursor:"pointer",fontSize:15,fontWeight:"bold",border:`2px solid ${numP===n?"#f59e0b":"rgba(255,255,255,0.12)"}`,background:numP===n?"rgba(245,158,11,0.12)":"rgba(255,255,255,0.03)",color:numP===n?"#fef3c7":"#64748b",transition:"all 0.18s"}}>
                  <div>{label}</div><div style={{fontSize:11,opacity:0.65,marginTop:4}}>{sub}</div>
                </button>
              ))}
            </div>

            {/* Player color preview */}
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:36}}>
              {(numP===2
                ?[{name:"Player 1",t:"team1",note:"or Team 1"},{name:"Player 2",t:"team2",note:"or Team 2"}]
                :[{name:"Player 1",t:"team1",note:""},{name:"Player 2",t:"team2",note:""},{name:"Player 3",t:"team3",note:""}]
              ).map((p,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",padding:"8px 14px",borderRadius:10,color:"#e2e8f0",fontSize:13}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:TEAMS[p.t].color,flexShrink:0,boxShadow:`0 0 6px ${TEAMS[p.t].glow}`}}/>
                  <div>
                    <div style={{fontWeight:"bold"}}>{p.name}</div>
                    <div style={{fontSize:10,opacity:0.55}}>{TEAMS[p.t].name}{p.note?" · "+p.note:""}</div>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={()=>setScreen("game")} style={{padding:"14px 52px",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#1a1a1a",border:"none",borderRadius:12,fontSize:17,fontWeight:"bold",cursor:"pointer",letterSpacing:"0.1em",boxShadow:"0 4px 28px rgba(245,158,11,0.38)"}}>START GAME</button>
          </div>
        </div>
      );

      // ── GAME ───────────────────────────────────────────────────────────────
      // position:fixed inset:0 guarantees the container is exactly the viewport.
      // Board gets explicit pixel width/height so CSS grid 1fr resolves correctly.
      // headerH=50px, padding=3px×2=6px, gap=3px → boardH = 100vh - 59px
      // panelW=68px, gap=4px → boardW = 100vw - 6px - 68px - 4px = 100vw - 78px
      return (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#071a0f",display:"flex",flexDirection:"column",padding:"3px",gap:"3px",boxSizing:"border-box",fontFamily:"'Georgia',serif",overflow:"hidden"}}>

          {/* HEADER */}
          <div style={{height:50,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,width:"100%"}}>
            <button onClick={()=>setScreen("setup")} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",color:"#64748b",padding:"4px 10px",borderRadius:8,cursor:"pointer",fontSize:11}}>← Setup</button>

            {!winner?(
              <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(0,0,0,0.45)",padding:"4px 16px",borderRadius:24,border:`1.5px solid ${T.color}45`}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:T.color,boxShadow:`0 0 8px ${T.glow}`}}/>
                <span style={{color:T.light,fontWeight:"bold",fontSize:13}}>{curName}</span>
                <span style={{color:"rgba(255,255,255,0.35)",fontSize:11}}>· {T.name} Team</span>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:10,background:`linear-gradient(135deg,${TEAMS[winner].color},${TEAMS[winner].color}bb)`,padding:"6px 20px",borderRadius:24,color:"#fff",fontWeight:"bold",fontSize:14}}>
                🎉 {TEAMS[winner].name} Team Wins!
                <button onClick={reset} style={{marginLeft:6,background:"rgba(0,0,0,0.25)",border:"none",color:"#fff",padding:"3px 10px",borderRadius:6,cursor:"pointer",fontSize:11}}>New Game</button>
              </div>
            )}

            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {activeTeams.map(t=>(
                <div key={t} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(0,0,0,0.35)",padding:"3px 10px",borderRadius:12}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:TEAMS[t].color}}/>
                  <span style={{color:"#e2e8f0",fontSize:12,fontWeight:"bold"}}>{seqs.filter(s=>s.team===t).length}/2</span>
                </div>
              ))}
              <button onClick={reset} style={{background:"rgba(255,50,50,0.1)",border:"1px solid rgba(255,100,100,0.25)",color:"#fca5a5",padding:"3px 9px",borderRadius:8,cursor:"pointer",fontSize:12}}>↺</button>
            </div>
          </div>

          {/* BODY ROW */}
          <div style={{display:"flex",flexDirection:"row",gap:4,width:"100%",height:"calc(100vh - 59px)"}}>

            {/* BOARD — explicit pixel dimensions so grid 1fr rows AND cols both work */}
            <div style={{
              width:"calc(100vw - 78px)",
              height:"100%",
              flexShrink:0,
              display:"grid",
              gridTemplateColumns:"repeat(10,1fr)",
              gridTemplateRows:"repeat(10,1fr)",
              gap:2,
              background:"#14542a",
              border:"3px solid #0a3319",
              borderRadius:6,
              padding:3,
              boxSizing:"border-box",
            }}>
              {BOARD.map((row,r)=>row.map((card,c)=>{
                const chip=chips[r][c], lk=isLocked(r,c);
                const p=parse(card), isFree=card==="FREE";
                const isRed=p&&RED[p.suit];
                const isRoyal=p&&ROYAL[p.val];
                const seqCell=seqs.find(s=>s.cells.some(([sr,sc])=>sr===r&&sc===c));

                const canRemove=!fixMode&&chip&&chip!==curTeam&&!lk;
                const canFix=fixMode&&chip===curTeam&&!lk;
                const canPlace=!fixMode&&!chip&&!isFree;

                let bg="#faf7ef";
                if(isFree) bg="#e8dfc8";
                else if(isRoyal&&p.val==="K") bg=isRed?"#fff8e8":"#f0f4ff";
                else if(isRoyal&&p.val==="Q") bg=isRed?"#fdf0ff":"#f0fff8";
                if(lk&&seqCell) bg=`${TEAMS[seqCell.team].light}70`;

                let bdr="1px solid #ccc5a0";
                if(isRoyal&&!lk) bdr=`1.5px solid ${isRed?"#d4a017":"#8888cc"}`;
                if(lk)        bdr="2px solid #f59e0b";
                if(canRemove) bdr="2.5px solid #ef4444";
                if(canFix)    bdr=`2.5px solid ${T.color}`;

                const tappable=canPlace||canRemove||canFix;
                const txtColor=isRed?"#dc2626":"#1e293b";
                const pipSize="clamp(8px,1.9vmin,17px)";
                const suitSize=isRoyal?"clamp(16px,4.0vmin,36px)":"clamp(14px,3.6vmin,32px)";

                return (
                  <div key={`${r}-${c}`} onClick={()=>tap(r,c)} style={{
                    background:bg,borderRadius:3,border:bdr,
                    cursor:tappable?"pointer":"default",
                    position:"relative",display:"flex",
                    alignItems:"center",justifyContent:"center",
                    overflow:"hidden",userSelect:"none",
                    WebkitUserSelect:"none",WebkitTapHighlightColor:"transparent",
                  }}>

                    {isFree ? (
                      <svg viewBox="0 0 100 100" style={{width:"88%",height:"88%"}}>
                        <circle cx="50" cy="50" r="47" fill="#f2ead8" stroke="#8b6914" strokeWidth="3"/>
                        <circle cx="50" cy="50" r="41" fill="none" stroke="#b8930a" strokeWidth="1.5"/>
                        <line x1="50" y1="10" x2="50" y2="90" stroke="#b8930a" strokeWidth="1.2" opacity="0.5"/>
                        <line x1="10" y1="50" x2="90" y2="50" stroke="#b8930a" strokeWidth="1.2" opacity="0.5"/>
                        <text x="29" y="44" fontSize="26" textAnchor="middle" fontFamily="serif" fill="#1e293b" opacity="0.82">♣</text>
                        <text x="71" y="44" fontSize="26" textAnchor="middle" fontFamily="serif" fill="#1e293b" opacity="0.82">♠</text>
                        <text x="29" y="74" fontSize="26" textAnchor="middle" fontFamily="serif" fill="#9b1c1c" opacity="0.82">♥</text>
                        <text x="71" y="74" fontSize="26" textAnchor="middle" fontFamily="serif" fill="#9b1c1c" opacity="0.82">♦</text>
                        <circle cx="50" cy="50" r="10" fill="#b8930a"/>
                        <circle cx="50" cy="50" r="7" fill="#f2ead8"/>
                        <circle cx="50" cy="50" r="4" fill="#b8930a"/>
                      </svg>
                    ) : (
                      <>
                        {isRoyal&&(
                          <span style={{
                            position:"absolute",top:"50%",left:"50%",
                            transform:"translate(-50%,-50%) rotate(-90deg)",
                            fontSize:"clamp(22px,6vmin,54px)",
                            color:isRed?"rgba(160,80,0,0.32)":"rgba(60,60,180,0.30)",
                            lineHeight:1,pointerEvents:"none",userSelect:"none",
                          }}>{ROYAL[p.val]}</span>
                        )}
                        <span style={{
                          position:"absolute",left:3,top:"50%",
                          transform:"translateY(-50%) rotate(-90deg)",
                          fontSize:pipSize,fontWeight:"bold",lineHeight:1,
                          color:txtColor,whiteSpace:"nowrap",zIndex:1,
                        }}>{dv(p.val)}{SYM[p.suit]}</span>
                        <span style={{
                          fontSize:suitSize,lineHeight:1,color:txtColor,
                          transform:"rotate(-90deg)",display:"block",zIndex:1,
                        }}>{SYM[p.suit]}</span>
                        <span style={{
                          position:"absolute",right:3,top:"50%",
                          transform:"translateY(-50%) rotate(90deg)",
                          fontSize:pipSize,fontWeight:"bold",lineHeight:1,
                          color:txtColor,whiteSpace:"nowrap",zIndex:1,
                        }}>{dv(p.val)}{SYM[p.suit]}</span>
                      </>
                    )}

                    {chip&&(
                      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",zIndex:2}}>
                        <div style={{
                          height:"82%",aspectRatio:"1/1",borderRadius:"50%",
                          background:TEAMS[chip].color,opacity:lk?1:0.88,
                          border:lk?"2.5px solid #f59e0b":"1.5px solid rgba(255,255,255,0.4)",
                          boxShadow:lk?"0 0 0 1.5px #f59e0b,0 2px 10px rgba(0,0,0,0.5)":"0 2px 6px rgba(0,0,0,0.4)",
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:"clamp(8px,1.9vmin,18px)",color:"rgba(255,255,255,0.9)",
                        }}>{lk&&"★"}</div>
                      </div>
                    )}
                    {canPlace&&(<div style={{position:"absolute",inset:0,background:`${T.color}18`,borderRadius:2,pointerEvents:"none",zIndex:1}}/>)}
                    {canRemove&&(<div style={{position:"absolute",inset:0,background:"rgba(239,68,68,0.15)",borderRadius:2,pointerEvents:"none",zIndex:1}}/>)}
                  </div>
                );
              }))}
            </div>

            {/* RIGHT PANEL — Fix Chip button, centered between players */}
            <div style={{
              flex:"1 1 auto",
              display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",
              gap:10,
              minWidth:0,
            }}>
              <button
                onClick={()=>setFixMode(f=>!f)}
                style={{
                  writingMode:"vertical-rl",
                  textOrientation:"mixed",
                  transform:"rotate(180deg)",
                  padding:"14px 10px",
                  borderRadius:12,
                  cursor:"pointer",
                  border:`1.5px solid ${fixMode?T.color:"rgba(255,255,255,0.15)"}`,
                  background:fixMode?`${T.color}28`:"rgba(255,255,255,0.04)",
                  color:fixMode?T.light:"#64748b",
                  fontSize:13,
                  fontWeight:fixMode?"bold":"normal",
                  letterSpacing:"0.05em",
                  transition:"all 0.15s",
                  lineHeight:1.3,
                  whiteSpace:"nowrap",
                }}
              >
                {fixMode ? "▶ Fix Mode ON" : "↩ Fix Chip"}
              </button>
              {fixMode&&(
                <div style={{
                  writingMode:"vertical-rl",
                  textOrientation:"mixed",
                  transform:"rotate(180deg)",
                  fontSize:9,color:T.light,
                  opacity:0.7,textAlign:"center",
                  lineHeight:1.4,
                  padding:"0 4px",
                }}>
                  tap your chip to remove
                </div>
              )}

              {/* Jack rules reminder */}
              <div style={{
                writingMode:"vertical-rl",
                textOrientation:"mixed",
                transform:"rotate(180deg)",
                fontSize:9,
                color:"rgba(255,255,255,0.28)",
                textAlign:"center",
                lineHeight:1.6,
                letterSpacing:"0.03em",
                marginTop:16,
                padding:"0 4px",
              }}>
                1-eye jack: remove · 2-eye jack: wild
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
