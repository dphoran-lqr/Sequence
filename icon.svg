<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Android squircle background — dark green -->
  <rect width="512" height="512" rx="115" ry="115" fill="#071a0f"/>

  <!-- Outer ring -->
  <rect x="18" y="18" width="476" height="476" rx="100" ry="100" fill="none" stroke="#f59e0b" strokeWidth="5" opacity="0.3"/>

  <!-- Chip body — ivory/tan, squircle shaped -->
  <rect x="32" y="32" width="448" height="448" rx="88" ry="88" fill="#f2ead8"/>

  <!-- Outer gold border on chip -->
  <rect x="32" y="32" width="448" height="448" rx="88" ry="88" fill="none" stroke="#8b6914" strokeWidth="10"/>

  <!-- Decorative inner ring -->
  <rect x="52" y="52" width="408" height="408" rx="72" ry="72" fill="none" stroke="#b8930a" strokeWidth="3.5"/>
  <rect x="66" y="66" width="380" height="380" rx="62" ry="62" fill="none" stroke="#d4aa20" strokeWidth="1.5" opacity="0.5"/>

  <!-- Slightly warm inner disc -->
  <rect x="76" y="76" width="360" height="360" rx="56" ry="56" fill="#ede3cc"/>
  <rect x="76" y="76" width="360" height="360" rx="56" ry="56" fill="none" stroke="#b8930a" strokeWidth="2"/>

  <!-- Cross dividers -->
  <line x1="256" y1="84"  x2="256" y2="428" stroke="#b8930a" stroke-width="3" opacity="0.5"/>
  <line x1="84"  y1="256" x2="428" y2="256" stroke="#b8930a" stroke-width="3" opacity="0.5"/>

  <!-- Dot accents where dividers meet inner ring -->
  <circle cx="256" cy="88"  r="6" fill="#b8930a"/>
  <circle cx="256" cy="424" r="6" fill="#b8930a"/>
  <circle cx="88"  cy="256" r="6" fill="#b8930a"/>
  <circle cx="424" cy="256" r="6" fill="#b8930a"/>

  <!-- Four suits -->
  <text x="172" y="218" font-family="Georgia,serif" font-size="100" text-anchor="middle" fill="#2c2015" opacity="0.88">♣</text>
  <text x="340" y="218" font-family="Georgia,serif" font-size="100" text-anchor="middle" fill="#2c2015" opacity="0.88">♠</text>
  <text x="172" y="352" font-family="Georgia,serif" font-size="100" text-anchor="middle" fill="#9b1c1c" opacity="0.88">♥</text>
  <text x="340" y="352" font-family="Georgia,serif" font-size="100" text-anchor="middle" fill="#9b1c1c" opacity="0.88">♦</text>

  <!-- Center medallion -->
  <circle cx="256" cy="256" r="40" fill="#b8930a"/>
  <circle cx="256" cy="256" r="32" fill="#f2ead8"/>
  <circle cx="256" cy="256" r="22" fill="#b8930a"/>
  <circle cx="256" cy="256" r="13" fill="#f2ead8"/>
</svg>
